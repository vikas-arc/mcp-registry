# EXAMPLE ONLY — do not commit real secrets.
# In production, source these from AWS Secrets Manager / SSM via the External Secrets
# Operator or the Secrets Store CSI driver, instead of a plain Secret. This file shows
# the keys the workloads expect.
apiVersion: v1
kind: Secret
metadata:
  name: mcp-secrets
  namespace: mcp
type: Opaque
stringData:
  # MongoDB (e.g. Atlas SRV URI)
  MONGO_URL: "mongodb+srv://USER:PASS@cluster.xxxx.mongodb.net/?retryWrites=true&w=majority"

  # OpenAI (agent service + pr-agent)
  OPENAI_API_KEY: "sk-..."
  OPENAI_KEY: "sk-..."            # pr-agent reads OPENAI_KEY

  # Optional: require this on the agent invoke API (X-API-Key)
  AGENT_API_KEY: ""

  # Atlassian SERVICE account PAT (read server only). Write server uses per-user BYOT.
  ATLASSIAN_SERVICE_PAT: "njg..."

  # Bitbucket Server (pr-agent)
  BITBUCKET_SERVER_TOKEN: "bb-..."
