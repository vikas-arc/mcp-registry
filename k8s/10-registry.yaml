apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: mcp
  labels: { app: registry }
spec:
  replicas: 2
  selector:
    matchLabels: { app: registry }
  template:
    metadata:
      labels: { app: registry }
    spec:
      containers:
        - name: registry
          image: ACCOUNT.dkr.ecr.REGION.amazonaws.com/mcp-registry:latest
          ports:
            - containerPort: 8000
          env:
            - name: MONGO_URL
              valueFrom: { secretKeyRef: { name: mcp-secrets, key: MONGO_URL } }
            - name: MONGO_DB
              valueFrom: { configMapKeyRef: { name: mcp-config, key: MONGO_DB } }
            - name: ALLOW_PRIVATE_NETWORKS
              valueFrom: { configMapKeyRef: { name: mcp-config, key: ALLOW_PRIVATE_NETWORKS } }
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: mcp
spec:
  selector: { app: registry }
  ports:
    - port: 8000
      targetPort: 8000
