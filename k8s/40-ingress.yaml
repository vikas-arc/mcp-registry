# ALB Ingress (requires the AWS Load Balancer Controller installed in the cluster).
# Fronts the registry (incl. /mcp endpoints + /ui) and the agent UI/invoke API with TLS.
# Only registry + agent are internet-facing; the MCP servers stay internal (ClusterIP only).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mcp-ingress
  namespace: mcp
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    # ACM cert covering both hostnames below:
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:REGION:ACCOUNT:certificate/CERT_ID
    alb.ingress.kubernetes.io/healthcheck-path: /health
spec:
  ingressClassName: alb
  rules:
    - host: registry.yourco.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: registry, port: { number: 8000 } } }
    - host: agent.yourco.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: agent, port: { number: 8800 } } }
